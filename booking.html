<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
    <title>Booking</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>Craftville</h1>
        <div class="nav-bar">
            <a href="index.html">
                <h2>Home</h2>
            </a>
            <a href="booking.html">
                <h2>Booking</h2>
            </a>
            <a href="gallery.html">
                <h2>Gallery</h2>
            </a>
            <a href="feedback.html">
                <h2>Feedback</h2>
            </a>
        </div>

    </header>
    <main id="booking-main">
        <h2>Book appointment:</h2>
        <div id="booking-form-container">
            <form class="booking-form" action="">

                <fieldset id="course-container">
                    <legend>Select course:</legend>
                    <select name="course" id="course">
                        <option value="mosaikk">Mosaikk kunst</option>
                        <option value="akvarell">Akvarellmaling</option>
                        <option value="lerret">Lerretsmaling</option>
                    </select>
                </fieldset>

                <fieldset>
                    <legend>How many people?</legend>
                    <select name="amount" id="amount">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </fieldset>

                <fieldset>
                    <legend>Select date</legend>
                    <input type="date" name="date" id="date">
                </fieldset>

                <fieldset>
                    <legend>Select payment method:</legend>
                    <label for="visa">Visa</label>
                    <input type="radio" name="payment" id="visa" value="visa">
                    <label for="mastercard">Mastercard</label>
                    <input type="radio" name="payment" id="mastercard" value="mastercard">
                    <label for="paypal">PayPal</label>
                    <input type="radio" name="payment" id="paypal" value="paypal">
                    <label for="vipps">Vipps</label>
                    <input type="radio" name="payment" id="vipps" value="vipps">
                    <label for="revolut">Revolut</label>
                    <input type="radio" name="payment" id="revolut" value="revolut">
                </fieldset>

                <fieldset>
                    <legend>Select shipping service:</legend>
                    <label for="posten">Posten</label>
                    <input type="radio" name="payment" id="posten" value="posten">
                    <label for="postnord">PostNord</label>
                    <input type="radio" name="payment" id="postnord" value="postnord">
                    <label for="helthjem">HeltHjem</label>
                    <input type="radio" name="payment" id="helthjem" value="helthjem">
                    <label for="bring">Bring</label>
                    <input type="radio" name="payment" id="bring" value="bring">
                </fieldset>

                <fieldset id="address-field">
                    <legend>Address:</legend>
                    <div id="street-field">
                        <label for="street">Street:</label>
                        <input type="text" id="street" placeholder="Route 66"
                            oninput="if(this.value.length > 20) this.value = this.value.slice(0, 20);">
                    </div>
                    <div id="postnr-field">
                        <label for="postnr">Post nr:</label>
                        <input type="number" id="postnr"
                            oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);" placeholder="0000">
                    </div>
                </fieldset>

                <h3 id="price">Price: -10 000,- NOK</h3>
                <button type="submit" value="submit" id="submit-btn">Submit</button>
            </form>
        </div>

    </main>
    <footer>
        <p>All rights belong to CRAFTSVILLA (Entreprenør) 2026</p>
    </footer>
</body>

</html>
